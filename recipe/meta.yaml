# Ensure that the VW and ASP meta.yaml files are in sync with each other and with 
# ISIS. 
{% set version = "asp3.5.0" %}

package:
    name: visionworkbench
    version: {{ version }}

source:
  git_url: git@github.com:visionworkbench/visionworkbench.git
# No git tag. Just built latest. More convenient this way.  
#  git_tag: {{ version }}

build:
  number: 1

requirements:
    build:
        # Old boost is failing to compile with new clang. Hopefully
        # this will go away when boost is upgraded.
        - clang >=16,<17         # ['osx']
        - clangxx >=16,<17       # ['osx']
        - gcc_linux-64 >=11,<12  # [linux]
        - gxx_linux-64 >=11,<12  # [linux]
        - cmake 3.27.9

    host:
        - clang >=16,<17         # ['osx']
        - clangxx >=16,<17       # ['osx']
        - gcc_linux-64 >=11,<12  # [linux]
        - gxx_linux-64 >=11,<12  # [linux]
        - libgdal                   3.7.1
        - llvm-openmp               16.0.6
        - nasa-ames-stereo-pipeline::ilmbase                   2.5.5
        - nasa-ames-stereo-pipeline::openexr                   2.5.5
        - flann                     1.9.1
        - openssl                   3.1.8
        - libssh2                   1.11.0
        - blas                      2.131
        - blas-devel                3.9.0
        - libblas                   3.9.0
        - libcblas                  3.9.0
        - liblapack                 3.9.0
        - liblapacke                3.9.0
        - libopenblas               0.3.29
        - openblas                  0.3.29
        - libopencv                 4.7.0
        - opencv                    4.7.0
        - proj                      9.2.1
        - hdf5                      1.14.1
        - libzlib                   1.3.1
        - zlib                      1.3.1
        - boost                     1.78.0
        - boost-cpp                 1.78.0
        - libcxx                    19.1.7

    run:
        - libgdal                   3.7.1
        - llvm-openmp               16.0.6
        - nasa-ames-stereo-pipeline::ilmbase                   2.5.5
        - nasa-ames-stereo-pipeline::openexr                   2.5.5
        - flann                     1.9.1
        - openssl                   3.1.8
        - libssh2                   1.11.0
        - blas                      2.131
        - blas-devel                3.9.0
        - libblas                   3.9.0
        - libcblas                  3.9.0
        - liblapack                 3.9.0
        - liblapacke                3.9.0
        - libopenblas               0.3.29
        - openblas                  0.3.29
        - libopencv                 4.7.0
        - opencv                    4.7.0
        - proj                      9.2.1
        - hdf5                      1.14.1
        - libzlib                   1.3.1
        - zlib                      1.3.1
        - boost                     1.78.0
        - boost-cpp                 1.78.0
        - libcxx                    19.1.7

test:
    files:
        imports:
        commands:
        comment: "Add here something like hillshade --help"

about:
    home: https://github.com/visionworkbench/visionworkbench
    license: APACHE
    summary: A general purpose image processing and computer vision library

extra:
  recipe-maintainers:
    - olegalexandrov
