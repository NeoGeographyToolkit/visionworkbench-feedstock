{% set version = "3.7.0" %}

package:
    name: visionworkbench
    version: {{ version }}

source:
  git_url: https://github.com/visionworkbench/visionworkbench.git
  git_rev: {{ version }}

build:
    number: 7
    string: asp_7
    skip: true  # [win]

requirements:
    build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - cmake >=3.27,<3.28
        - make
    host:
        # Deps synced to asp_deps / stereopipeline-feedstock (2026-06-06).
        # VW finds these via ASP_DEPS_DIR=$PREFIX.
        - libboost-devel >=1.88.0,<1.89
        - flann
        - libopenblas
        - blas
        # aarch64: force openblas - conda-forge default blas here is blis, whose
        # aarch64 2.0 build aborts at runtime in a virtualized VM (bli_gks.c MC/MR).
        - libblas * *openblas*      # [aarch64]
        - liblapack * *openblas*    # [aarch64]
        - libjpeg-turbo
        - libpng >=1.6.34,<1.7
        - libtiff >=4.5,<4.8
        - zlib
        - gdal 3.12.2
        - libgdal 3.12.2
        - proj 9.7.*
        - libopencv >=4.12,<4.13
        - isis =10.0.0=asp*   # option(b): align all shared deps to isis snapshot
        - lz4-c
    run:
        - libboost >=1.88.0,<1.89
        - flann
        - libopenblas
        - libjpeg-turbo
        - libpng >=1.6.34,<1.7
        - libtiff >=4.5,<4.8
        - zlib
        - gdal 3.12.2
        - libgdal 3.12.2
        - proj 9.7.*
        - libopencv >=4.12,<4.13
        - lz4-c

test:
    commands:
        - test -e $PREFIX/bin/hillshade    # [unix]
        - test -e $PREFIX/lib/libVwCore${SHLIB_EXT}  # [unix]

about:
    home: https://github.com/visionworkbench/visionworkbench
    license: Apache-2.0
    license_file: COPYING
    summary: A general purpose image processing and computer vision library

extra:
  recipe-maintainers:
    - oleg-alexandrov
