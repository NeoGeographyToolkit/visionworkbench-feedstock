{% set version = "2.6.2" %}
package:
    name: visionworkbench
    version: {{ version }}

source:
    fn: {{ version }}.tar.gz
    url: https://github.com/visionworkbench/visionworkbench/archive/{{ version }}.tar.gz
    sha256sum: 9703e130b2c100b8aafbce64d8f57c98d5d7895f02c40633346e8eee521e8fbb

build:
    number: 0

requirements:
    build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - cmake                     3.14.5
        - gdal                      2.0.2
        - ilmbase                   2.3.0
        - openexr                   2.3.0
        - eigen                     3.3.7
        - pbzip2                    1.1.13
        - gflags                    2.2.2
        - glog                      0.4.0
        - ceres-solver              1.14.0
        - parallel                  20200522
        - flann                     1.9.1
        - opencv                    3.2.0
        - boost                     1.68.0
        - liblapack                 3.8.0
        - blas                      1.1

    run:
        - gdal                      2.0.2
        - ilmbase                   2.3.0
        - openexr                   2.3.0
        - eigen                     3.3.7
        - pbzip2                    1.1.13
        - gflags                    2.2.2
        - glog                      0.4.0
        - ceres-solver              1.14.0
        - parallel                  20200522
        - flann                     1.9.1
        - opencv                    3.2.0
        - boost                     1.68.0
        - liblapack                 3.8.0
        - blas                      1.1

test:
    files:
        imports:
        commands:
        comment: "Add here something like hillshade --help"

about:
    home: https://github.com/visionworkbench/visionworkbench
    license: Apache II
    summary: 

extra:
  recipe-maintainers:
    - olegalexandrov
