# Ensure that the VW and ASP meta.yaml files are in sync with each other and with 
# ISIS. 
# Specify the correct tag in git_tag, for example, 3.0.0, or a commit hash.

#{% set version = "isis5.0.1" %} # synched up to isis dependencies for this version
{% set version = "3.0.0" %}

package:
    name: visionworkbench
    version: {{ version }}

source:
  git_url: git@github.com:visionworkbench/visionworkbench.git
  #git_tag: 9048618 # ensure the correct tag here
  git_tag: 3.0.0 # ensure the correct tag here

build:
    number: 0

requirements:
    build:
# Use the local compiler for OSX. See build.sh for details.
        - {{ compiler('c') }}    # [linux]
        - {{ compiler('cxx') }}  # [linux]
        - cmake 3.16.0
        - llvm-openmp  # [osx]
#       - libgomp      # [linux]
    host:
        - libgdal                   2.4.1_isis5.0.1
        - ilmbase
        - openexr
        - flann                     1.9.1
        - opencv                    3.2.0
        - openssl                   1.0.2u
        - libssh2                   1.8.0
        - openmp                    8.0.1 # [linux]
        - boost                     1.68.0
        - openblas
        - liblapack                 3.8.0
        - blas                      1.1
        - proj4                     5.2.0
        - hdf5                      1.8.18

    run:
        - libgdal                   2.4.1_isis5.0.1
        - ilmbase
        - openexr
        - flann                     1.9.1
        - opencv                    3.2.0
        - openssl                   1.0.2u
        - libssh2                   1.8.0
        - openmp                    8.0.1 # [linux]
        - boost                     1.68.0
        - openblas
        - blas                      1.1
        - liblapack                 3.8.0
        - proj4                     5.2.0
        - hdf5                      1.8.18

test:
    files:
        imports:
        commands:
        comment: "Add here something like hillshade --help"

about:
    home: https://github.com/visionworkbench/visionworkbench
    license: APACHE
    summary: A general purpose image processing and computer vision library

extra:
  recipe-maintainers:
    - olegalexandrov
