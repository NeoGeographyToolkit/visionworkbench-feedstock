{% set version = "02f1f9f" %}
package:
    name: visionworkbench
    version: {{ version }}

source:
  git_url: git@github.com:visionworkbench/visionworkbench.git
  git_tag: {{ version }}

build:
    number: 0

requirements:
    build:
        - {{ compiler('c') }}    # [linux]
        - {{ compiler('cxx') }}  # [linux]
        - cmake
        - llvm-openmp  # [osx]
#       - libgomp      # [linux]
    host:
        - gdal                      2.0.2
        - ilmbase
        - openexr
        - eigen
        - pbzip2
        - gflags
        - glog
        - suitesparse               5.7.2
        - ceres-solver              1.14.0
        - parallel
        - flann                     1.9.1
        - opencv                    3.2.0
        - openmp # [linux]
        - boost                     1.68
        - liblapack
        - blas
        - geotiff                   1.4.2
        - proj4                     4.9.3
        - geos                      3.7.3
        - hdf5                      1.8.*

    run:
        - gdal                      2.0.2
        - ilmbase
        - openexr
        - eigen
        - pbzip2
        - gflags
        - glog
        - suitesparse               5.7.2
        - ceres-solver              1.14.0
        - parallel
        - flann                     1.9.1
        - opencv                    3.2.0
        - openmp # [linux]
        - boost                     1.68
        - liblapack
        - blas
        - geotiff                   1.4.2
        - proj4                     4.9.3
        - geos                      3.7.3
        - hdf5                      1.8.*

test:
    files:
        imports:
        commands:
        comment: "Add here something like hillshade --help"

about:
    home: https://github.com/visionworkbench/visionworkbench
    license: APACHE
    summary: A general purpose image processing and computer vision library

extra:
  recipe-maintainers:
    - olegalexandrov
