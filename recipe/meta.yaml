# Ensure that the VW and ASP meta.yaml files are in sync with each other and with 
# ISIS. 
{% set version = "asp3.5.0" %}

package:
    name: visionworkbench
    version: {{ version }}

source:
  git_url: git@github.com:visionworkbench/visionworkbench.git
# No git tag. Just built latest. More convenient this way.  
#  git_tag: {{ version }}

build:
    number: 0

requirements:
    build:
        - {{ compiler('c') }} 
        - {{ compiler('cxx') }}
        - cmake

    host:
        - libgdal                   3.7.1
        - llvm-openmp               16.0.6
        - ilmbase                   2.5.5
        - openexr                   3.2.2
        - flann                     1.9.1
        - opencv                    4.7.0
        - openssl                   3.1.8
        - libssh2                   1.11.0
        - boost                     1.78.0
        - openblas
        - liblapack                 3.9.0
        - blas                      2.131
        - proj                      9.2.1
        - hdf5                      1.14.1
  
    run:
        - libgdal                   3.7.1
        - llvm-openmp               16.0.6
        - ilmbase                   2.5.5
        - openexr                   3.2.2
        - flann                     1.9.1
        - opencv                    4.7.0
        - openssl                   3.1.8
        - libssh2                   1.11.0
        - boost                     1.78.0
        - openblas
        - liblapack                 3.9.0
        - blas                      2.131
        - proj                      9.2.1
        - hdf5                      1.14.1

test:
    files:
        imports:
        commands:
        comment: "Add here something like hillshade --help"

about:
    home: https://github.com/visionworkbench/visionworkbench
    license: APACHE
    summary: A general purpose image processing and computer vision library

extra:
  recipe-maintainers:
    - olegalexandrov
