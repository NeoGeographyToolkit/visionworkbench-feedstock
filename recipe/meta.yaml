# Ensure that the VW and ASP meta.yaml files are in sync with each other and with 
# ISIS. 
# Specify the correct tag in git_tag, for example, 2.7.0, or a commit hash.

{% set version = "isis5.0.1" %} # synched up to isis dependencies for this version

package:
    name: visionworkbench
    version: {{ version }}

source:
  git_url: git@github.com:visionworkbench/visionworkbench.git
  git_tag: 6258751 # ensure the correct tag here

build:
    number: 0

requirements:
    build:
# Use the local compiler for OSX. See build.sh for details.
        - {{ compiler('c') }}    # [linux]
        - {{ compiler('cxx') }}  # [linux]
        - cmake 3.16.0
        - llvm-openmp  # [osx]
#       - libgomp      # [linux]
    host:
        - gdal                      isis5.0.1
        - ilmbase
        - openexr
        - eigen                     3.3.7
        - gflags
        - glog
        - suitesparse               5.10.1
        - parallel
        - flann                     1.9.1
        - opencv                    3.2.0
        - openmp                    # [linux]
        - boost                     1.68.0
        - liblapack                 3.8.0
        - blas                      1.1
        - geotiff                   1.4.3
        - proj4                     5.2.0
        - geos                      3.7.3
        - hdf5                      1.8.18

    run:
        - gdal                      isis5.0.1
        - ilmbase
        - openexr
        - eigen                     3.3.7
        - gflags
        - glog
        - suitesparse               5.10.1
        - parallel
        - flann                     1.9.1
        - opencv                    3.2.0
        - openmp                    # [linux]
        - boost                     1.68.0
        - liblapack                 3.8.0
        - blas                      1.1
        - geotiff                   1.4.3
        - proj4                     5.2.0
        - geos                      3.7.3
        - hdf5                      1.8.18

test:
    files:
        imports:
        commands:
        comment: "Add here something like hillshade --help"

about:
    home: https://github.com/visionworkbench/visionworkbench
    license: APACHE
    summary: A general purpose image processing and computer vision library

extra:
  recipe-maintainers:
    - olegalexandrov
